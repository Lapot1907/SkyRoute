<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Fixtures</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #07111f;
            --card: #101c30;
            --card2: #182842;
            --line: #304566;
            --text: #ffffff;
            --muted: #c7d6ee;
            --blue: #0b5cff;
            --green: #00c853;
            --gold: #ffd36b;
            --red: #ef4444;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: radial-gradient(circle at top, #10264a 0, #07111f 52%, #03070d 100%);
            color: var(--text);
        }

        header {
            padding: 26px 16px;
            text-align: center;
            background: linear-gradient(135deg, #0642a4, #02b5ff);
            box-shadow: 0 8px 25px #0006;
        }

        header h1 {
            margin: 0;
            font-size: 27px;
        }

        header p {
            margin: 8px 0 0;
            color: #eaf3ff;
        }

        .wrap {
            padding: 14px;
            max-width: 980px;
            margin: auto;
        }

        .card {
            background: rgba(16, 28, 48, .94);
            border: 1px solid #263a5c;
            border-radius: 18px;
            padding: 16px;
            margin: 14px 0;
            box-shadow: 0 8px 25px #0004;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            color: #f2f7ff;
        }

        select,
        button,
        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 0;
            font-size: 16px;
            margin-top: 8px;
        }

        select,
        input {
            background: #f6f7fb;
            color: #111;
        }

        button {
            background: var(--green);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button.secondary {
            background: #243856;
        }

        button.danger {
            background: var(--red);
        }

        button.smallbtn {
            width: auto;
            padding: 9px 12px;
            font-size: 13px;
            margin: 4px 3px;
            border-radius: 10px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-top: 12px;
        }

        .tab {
            white-space: nowrap;
            background: #243856;
        }

        .tab.active {
            background: var(--blue);
        }

        h2 {
            font-size: 30px;
            margin: 8px 0 12px;
        }

        h3 {
            margin: 6px 0 12px;
        }

        .match {
            background: var(--card2);
            border: 1px solid var(--line);
            border-radius: 15px;
            padding: 14px;
            margin: 12px 0;
        }

        .teams {
            font-size: 21px;
            font-weight: bold;
            line-height: 1.3;
        }

        .meta {
            color: var(--muted);
            margin-top: 8px;
            line-height: 1.65;
        }

        .badge {
            display: inline-block;
            background: var(--blue);
            padding: 5px 10px;
            border-radius: 20px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .flag {
            font-size: 25px;
            margin-right: 8px;
        }

        .countdown {
            color: var(--gold);
            font-weight: bold;
        }

        .groupGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(245px, 1fr));
            gap: 12px;
        }

        .groupBox {
            background: #0b1628;
            border: 1px solid #263a5c;
            border-radius: 14px;
            padding: 12px;
        }

        .teamPill {
            background: #172640;
            border-radius: 10px;
            margin: 6px 0;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .teamCode {
            margin-left: auto;
            color: #9fb0cc;
        }

        .scoreBox {
            margin-top: 12px;
            background: #0b1628;
            border: 1px solid #263a5c;
            border-radius: 12px;
            padding: 12px;
        }

        .scoreGrid {
            display: grid;
            grid-template-columns: 1fr 80px 80px 1fr;
            gap: 8px;
            align-items: center;
        }

        .scoreGrid input {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
        }

        .scoreSaved {
            color: var(--gold);
            font-weight: bold;
            margin-top: 8px;
        }

        .tableWrap {
            overflow-x: auto;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 620px;
        }

        th,
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #263a5c;
            text-align: center;
        }

        th {
            color: #9fb0cc;
            font-size: 13px;
        }

        td.teamCell {
            text-align: left;
            font-weight: bold;
        }

        tr.qualify {
            background: rgba(0, 200, 83, .12);
        }

        .footer {
            text-align: center;
            color: #9fb0cc;
            font-size: 12px;
            padding: 18px;
        }

        @media (max-width: 650px) {
            .row {
                grid-template-columns: 1fr;
            }

            .scoreGrid {
                grid-template-columns: 1fr 55px 55px 1fr;
                gap: 6px;
            }

            header h1 {
                font-size: 24px;
            }

            h2 {
                font-size: 27px;
            }
        }
    </style>
</head>

        const timeZones = [
            ["auto", "Auto detect my time zone"],
            ["Europe/London", "United Kingdom"],
            ["Europe/Istanbul", "Türkiye"],
            ["America/New_York", "New York / East USA"],
            ["America/Los_Angeles", "Los Angeles / West USA"],
            ["America/Toronto", "Toronto / Canada"],
            ["America/Vancouver", "Vancouver / Canada"],
            ["America/Mexico_City", "Mexico"],
            ["Europe/Paris", "Europe / Paris"],
            ["Asia/Dubai", "Dubai"],
            ["Asia/Tokyo", "Japan"],
            ["Australia/Sydney", "Australia Sydney"]
        ];

        let currentMode = "country";
        let currentStage = "all";
        let scores = loadScores();

        function loadScores() {
            try {
                return JSON.parse(localStorage.getItem("wc2026_scores") || "{}");
            } catch (error) {
                return {};
            }
        }

        function saveScores() {
            localStorage.setItem("wc2026_scores", JSON.stringify(scores));
        }

        function preferredCountry() {
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";

            if (tz.includes("Istanbul")) return "Türkiye";
            if (tz.includes("London")) return "England";
            if (tz.includes("New_York") || tz.includes("Los_Angeles") || tz.includes("Chicago")) return "United States";
            if (tz.includes("Toronto") || tz.includes("Vancouver")) return "Canada";
            if (tz.includes("Mexico")) return "Mexico";
            if (tz.includes("Tokyo")) return "Japan";
            if (tz.includes("Sydney")) return "Australia";

            return "England";
        }

        function init() {
            const countrySelect = document.getElementById("countrySelect");

            Object.keys(teamInfo).sort().forEach(function(name) {
                const option = document.createElement("option");
                option.value = name;
                option.textContent = teamInfo[name].flag + " " + name;
                countrySelect.appendChild(option);
            });

            countrySelect.value = preferredCountry();

            const timezoneSelect = document.getElementById("timezoneSelect");

            timeZones.forEach(function(row) {
                const option = document.createElement("option");
                option.value = row[0];
                option.textContent = row[1];
                timezoneSelect.appendChild(option);
            });

            timezoneSelect.addEventListener("change", function() {
                currentMode === "country" ? showCountry() : showAll();
            });

            showCountry();
            setInterval(updateCountdowns, 60000);
        }

        function getTimeZone() {
            const selected = document.getElementById("timezoneSelect").value;

            if (selected === "auto") {
                return Intl.DateTimeFormat().resolvedOptions().timeZone || "Europe/London";
            }

            return selected;
        }

        function formatTime(utc, timezone) {
            return new Date(utc).toLocaleString("en-GB", {
                timeZone: timezone,
                weekday: "short",
                day: "2-digit",
                month: "short",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function countdown(utc) {
            const diff = new Date(utc) - new Date();

            if (diff <= 0) {
                return "Started / finished";
            }

            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);

            return days + "d " + hours + "h " + minutes + "m";
        }

        function filterStage(list) {
            if (currentStage === "group") {
                return list.filter(match => match.stage.startsWith("Group"));
            }

            if (currentStage === "knockout") {
                return list.filter(match => !match.stage.startsWith("Group"));
            }

            return list;
        }

        function flag(name) {
            return teamInfo[name]?.flag || "⚽";
        }

        function render(list, title) {
            const timezone = getTimeZone();

            list = filterStage(list).sort(function(a, b) {
                return new Date(a.utc) - new Date(b.utc);
            });

            document.getElementById("results").innerHTML = `
                <div class="card">
                    <h2>${title}</h2>
                    <div class="meta">
                        Time zone: <b>${timezone}</b> · Matches shown: <b>${list.length}</b>
                    </div>
                    ${list.map(match => matchCard(match, timezone)).join("")}
                </div>
            `;

            updateCountdowns();
        }

        function matchCard(match, timezone) {
            const saved = scores[match.num];
            const homeScore = saved ? saved.home : "";
            const awayScore = saved ? saved.away : "";
            const isGroupMatch = match.stage.startsWith("Group");

            return `
                <div class="match">
                    <div class="badge">${match.stage} · Match ${match.num}</div>

                    <div class="teams">
                        <span class="flag">${flag(match.home)}</span>${match.home}
                        <span style="color:#9fb0cc"> vs </span>
                        <span class="flag">${flag(match.away)}</span>${match.away}
                    </div>

                    <div class="meta">
                        🏟 City: ${match.city}<br>
                        🕒 Your time: <b>${formatTime(match.utc, timezone)}</b><br>
                        📍 Stadium time: ${formatTime(match.utc, match.venueTimeZone)}<br>
                        🇬🇧 UK time: ${formatTime(match.utc, "Europe/London")}<br>
                        🌐 UTC: ${formatTime(match.utc, "UTC")}<br>
                        ⏳ Countdown:
                        <span class="countdown" data-utc="${match.utc}">
                            ${countdown(match.utc)}
                        </span><br>
                        <button class="smallbtn" onclick='downloadICS(${JSON.stringify(match)})'>
                            Add to Calendar
                        </button>
                    </div>

                    ${isGroupMatch ? `
                        <div class="scoreBox">
                            <label>Enter score</label>
                            <div class="scoreGrid">
                                <div>${flag(match.home)} ${match.home}</div>
                                <input id="homeScore-${match.num}" type="number" min="0" value="${homeScore}" placeholder="0">
                                <input id="awayScore-${match.num}" type="number" min="0" value="${awayScore}" placeholder="0">
                                <div>${flag(match.away)} ${match.away}</div>
                            </div>

                            <button class="smallbtn" onclick="saveMatchScore(${match.num})">
                                Save Score
                            </button>

                            <button class="smallbtn danger" onclick="clearMatchScore(${match.num})">
                                Clear
                            </button>

                            <button class="smallbtn secondary" onclick="showTables()">
                                View Tables
                            </button>

                            ${saved ? `<div class="scoreSaved">Saved: ${match.home} ${saved.home} - ${saved.away} ${match.away}</div>` : ""}
                        </div>
                    ` : ""}
                </div>
            `;
        }

        function saveMatchScore(matchNumber) {
            const homeInput = document.getElementById("homeScore-" + matchNumber);
            const awayInput = document.getElementById("awayScore-" + matchNumber);

            if (!homeInput || !awayInput) return;

            if (homeInput.value === "" || awayInput.value === "") {
                alert("Please enter both scores.");
                return;
            }

            scores[matchNumber] = {
                home: Number(homeInput.value),
                away: Number(awayInput.value)
            };

            saveScores();

            currentMode === "country" ? showCountry() : showAll();
        }

        function clearMatchScore(matchNumber) {
            delete scores[matchNumber];
            saveScores();

            currentMode === "country" ? showCountry() : showAll();
        }

        function resetAllScores() {
            if (!confirm("Clear all saved scores?")) return;

            scores = {};
            saveScores();
            showTables();
        }

        function calculateTables() {
            const tables = {};

            Object.keys(groups).forEach(function(groupLetter) {
                tables[groupLetter] = {};

                groups[groupLetter].forEach(function(team) {
                    tables[groupLetter][team[0]] = {
                        team: team[0],
                        flag: team[2],
                        played: 0,
                        won: 0,
                        drawn: 0,
                        lost: 0,
                        goalsFor: 0,
                        goalsAgainst: 0,
                        goalDifference: 0,
                        points: 0
                    };
                });
            });

            fixtures.forEach(function(match) {
                if (!match.stage.startsWith("Group")) return;

                const result = scores[match.num];
                if (!result) return;

                const groupLetter = match.stage.replace("Group ", "");
                const home = tables[groupLetter][match.home];
                const away = tables[groupLetter][match.away];

                if (!home || !away) return;

                const homeGoals = Number(result.home);
                const awayGoals = Number(result.away);

                home.played++;
                away.played++;

                home.goalsFor += homeGoals;
                home.goalsAgainst += awayGoals;

                away.goalsFor += awayGoals;
                away.goalsAgainst += homeGoals;

                if (homeGoals > awayGoals) {
                    home.won++;
                    away.lost++;
                    home.points += 3;
                } else if (homeGoals < awayGoals) {
                    away.won++;
                    home.lost++;
                    away.points += 3;
                } else {
                    home.drawn++;
                    away.drawn++;
                    home.points++;
                    away.points++;
                }
            });

            Object.keys(tables).forEach(function(groupLetter) {
                Object.values(tables[groupLetter]).forEach(function(team) {
                    team.goalDifference = team.goalsFor - team.goalsAgainst;
                });
            });

            return tables;
        }

        function showTables(button) {
            document.querySelectorAll(".tab").forEach(function(tab) {
                tab.classList.remove("active");
            });

            if (button) {
                button.classList.add("active");
            }

            const tables = calculateTables();

            const html = Object.keys(tables).map(function(groupLetter) {
                const rows = Object.values(tables[groupLetter]).sort(function(a, b) {
                    return b.points - a.points ||
                        b.goalDifference - a.goalDifference ||
                        b.goalsFor - a.goalsFor ||
                        a.team.localeCompare(b.team);
                });

                return `
                    <div class="groupBox">
                        <h3>Group ${groupLetter}</h3>
                        <div class="tableWrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Pos</th>
                                        <th>Team</th>
                                        <th>P</th>
                                        <th>W</th>
                                        <th>D</th>
                                        <th>L</th>
                                        <th>GF</th>
                                        <th>GA</th>
                                        <th>GD</th>
                                        <th>Pts</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rows.map(function(team, index) {
                                        return `
                                            <tr class="${index < 2 ? "qualify" : ""}">
                                                <td>${index + 1}</td>
                                                <td class="teamCell">${team.flag} ${team.team}</td>
                                                <td>${team.played}</td>
                                                <td>${team.won}</td>
                                                <td>${team.drawn}</td>
                                                <td>${team.lost}</td>
                                                <td>${team.goalsFor}</td>
                                                <td>${team.goalsAgainst}</td>
                                                <td>${team.goalDifference}</td>
                                                <td><b>${team.points}</b></td>
                                            </tr>
                                        `;
                                    }).join("")}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }).join("");

            document.getElementById("results").innerHTML = `
                <div class="card">
                    <h2>Group Tables</h2>
                    <div class="meta">
                        Top two teams are highlighted. Tables update automatically when you save scores.
                    </div>
                    <button class="smallbtn danger" onclick="resetAllScores()">Reset All Scores</button>
                    <div class="groupGrid" style="margin-top:12px">
                        ${html}
                    </div>
                </div>
            `;
        }

        function updateCountdowns() {
            document.querySelectorAll(".countdown").forEach(function(element) {
                element.textContent = countdown(element.dataset.utc);
            });
        }

        function showCountry() {
            currentMode = "country";

            const country = document.getElementById("countrySelect").value;
            const matches = fixtures.filter(function(match) {
                return match.home === country || match.away === country;
            });

            render(matches, teamInfo[country].flag + " " + country + " Fixtures");
        }

        function showAll() {
            currentMode = "all";
            render(fixtures, "All Fixtures");
        }

        function setStage(stage, button) {
            currentStage = stage;

            document.querySelectorAll(".tab").forEach(function(tab) {
                tab.classList.remove("active");
            });

            if (button) {
                button.classList.add("active");
            }

            currentMode === "country" ? showCountry() : showAll();
        }

        function showGroups(button) {
            document.querySelectorAll(".tab").forEach(function(tab) {
                tab.classList.remove("active");
            });

            if (button) {
                button.classList.add("active");
            }

            const html = Object.entries(groups).map(function(row) {
                const groupLetter = row[0];
                const teams = row[1];

                const teamRows = teams.map(function(team) {
                    return `
                        <div class="teamPill">
                            <span class="flag">${team[2]}</span>
                            <b>${team[0]}</b>
                            <span class="teamCode">${team[1]}</span>
                        </div>
                    `;
                }).join("");

                return `
                    <div class="groupBox">
                        <h3>Group ${groupLetter}</h3>
                        ${teamRows}
                    </div>
                `;
            }).join("");

            document.getElementById("results").innerHTML = `
                <div class="card">
                    <h2>Groups A-L</h2>
                    <div class="groupGrid">${html}</div>
                </div>
            `;
        }

        function downloadICS(match) {
            const start = new Date(match.utc);
            const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);

            function stamp(date) {
                return date.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
            }

            const title = "World Cup 2026: " + match.home + " vs " + match.away;

            const ics = [
                "BEGIN:VCALENDAR",
                "VERSION:2.0",
                "PRODID:-//World Cup 2026 Fixtures//EN",
                "BEGIN:VEVENT",
                "UID:wc2026-" + match.num + "@fixtures",
                "DTSTAMP:" + stamp(new Date()),
                "DTSTART:" + stamp(start),
                "DTEND:" + stamp(end),
                "SUMMARY:" + title,
                "LOCATION:" + match.city,
                "DESCRIPTION:" + match.stage + " - Match " + match.num,
                "END:VEVENT",
                "END:VCALENDAR"
            ].join("\\n");

            const blob = new Blob([ics], { type: "text/calendar" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");

            a.href = url;
            a.download = "wc2026-match-" + match.num + ".ics";
            a.click();

            URL.revokeObjectURL(url);
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>
